<section
  id="{{ job.job_id }}"
  class="space-y-6"
  {% if job.status == "running" %}
    hx-get="/jobs/{{ job.job_id }}"
    hx-trigger="every 600ms"
    hx-swap="outerHTML"
  {% endif %}
>
  <div>
    <p class="text-sm font-semibold text-blue-700">Agent is working</p>
    <h2 class="mt-1 text-2xl font-bold text-slate-950">{{ job.title }}</h2>
  </div>

  {% if job.status == "failed" %}
    <div class="rounded-lg border border-red-200 bg-red-50 p-4 text-sm font-medium text-red-800">
      {{ job.error }}
    </div>
  {% else %}
    {% set steps = job.progress %}
    {% include "partials/progress.html" with context %}
  {% endif %}
</section>
