<section class="space-y-4" data-summary-review>
  <div class="flex flex-col gap-2 sm:flex-row sm:items-end sm:justify-between">
    <div>
      <h2 class="mt-1 text-2xl font-bold text-slate-950">要約確認</h2>
    </div>
    <span class="locked-visible rounded-md bg-teal-100 px-3 py-1.5 text-sm font-bold text-teal-800">要約確定済み</span>
  </div>

  {% set active_step = 2 %}
  {% include "partials/stepper.html" with context %}

  <details class="rounded-lg border border-slate-200 bg-white px-4 py-3">
    <summary class="cursor-pointer text-sm font-bold text-slate-800">Agent 処理ログを見る</summary>
    <div class="mt-4 border-t border-slate-100 pt-4">
      {% set progress_shell = "plain" %}
      {% include "partials/progress.html" with context %}
    </div>
  </details>

  <div class="border-b border-slate-200 pb-4">
    <p class="text-xs font-bold uppercase tracking-[0.08em] text-slate-500">記事タイトル</p>
    <h3 class="mt-1 text-xl font-bold text-slate-950">{{ summary.title }}</h3>
    <p class="mt-2 break-all text-sm text-slate-500">{{ summary.url }}</p>
  </div>

  <form
    hx-post="/graphics"
    hx-target="#graphic-stage"
    hx-swap="innerHTML scroll:#graphic-stage:top"
    hx-indicator="#graphic-loading"
    hx-disabled-elt="find button[type='submit']"
    class="space-y-4"
    data-graphic-workflow
  >
    <input type="hidden" name="session_id" value="{{ summary.session_id }}" />
    <div class="summary-card-grid grid gap-4 pb-14 lg:grid-cols-2">
      <label class="block rounded-lg border border-slate-200 bg-white p-4 shadow-sm">
        <span class="text-base font-bold text-slate-950">3 行要約</span>
        <textarea
          name="summary_text"
          aria-label="3 行要約を編集"
          rows="6"
          class="mt-3 w-full resize-y rounded-md border border-slate-200 bg-slate-50 px-4 py-2 text-base leading-6 text-slate-900 outline-none ring-blue-600 transition focus:border-blue-500 focus:bg-white focus:ring-2"
        >{{ summary.summary_lines | join('\n') }}</textarea>
      </label>
      <label class="block rounded-lg border border-slate-200 bg-white p-4 shadow-sm">
        <span class="text-base font-bold text-slate-950">重要ポイント</span>
        <textarea
          name="key_points_text"
          aria-label="重要ポイントを編集"
          rows="6"
          class="mt-3 w-full resize-y rounded-md border border-slate-200 bg-slate-50 px-4 py-2 text-base leading-6 text-slate-900 outline-none ring-blue-600 transition focus:border-blue-500 focus:bg-white focus:ring-2"
        >{{ summary.key_points | join('\n') }}</textarea>
      </label>
    </div>
    <div class="lock-hidden sticky bottom-3 z-10 -mx-2 flex flex-col gap-3 bg-slate-50/90 px-2 py-2 backdrop-blur sm:flex-row sm:items-center sm:justify-end">
      <span id="graphic-loading" class="htmx-indicator text-sm font-medium text-blue-700">Agent が構成案と画像を生成しています...</span>
      <button
        type="submit"
        class="inline-flex items-center justify-center rounded-md bg-blue-700 px-6 py-3 text-base font-semibold text-white shadow-lg shadow-blue-700/20 transition hover:bg-blue-800 disabled:cursor-not-allowed disabled:opacity-60"
      >
        グラレコを生成
      </button>
    </div>
    <div class="locked-actions justify-end">
      <button
        type="button"
        data-unlock-summary
        class="rounded-md border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-50"
      >
        要約を修正して再生成
      </button>
    </div>
  </form>

  <div id="graphic-stage" class="mt-4 scroll-mt-24"></div>
</section>
