<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Graphic Recording Agent Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}" />
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-950">
    <main class="mx-auto flex min-h-screen w-full max-w-6xl flex-col px-5 py-8">
      <header class="mb-7 flex flex-col gap-2 border-b border-slate-200 pb-5">
        <p class="text-sm font-semibold text-blue-700">Gemini Enterprise Agent Platform / ADK / Agent Runtime Demo</p>
        <h1 class="text-3xl font-bold tracking-normal text-slate-950">Blog URL to Graphic Recording</h1>
      </header>

      <section class="grid gap-6 lg:grid-cols-[360px_1fr]">
        <div class="self-start rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
          <form
            class="space-y-4"
            hx-post="/summaries"
            hx-target="#workspace"
            hx-swap="innerHTML"
            hx-indicator="#summary-loading"
          >
            <label for="url" class="block text-sm font-semibold text-slate-700">ブログ記事 URL</label>
            <input
              id="url"
              name="url"
              type="url"
              required
              placeholder="https://example.com/blog/agent-runtime"
              class="w-full rounded-md border border-slate-300 px-3 py-2 text-base outline-none ring-blue-600 transition focus:ring-2"
            />
            <button
              type="submit"
              class="inline-flex w-full items-center justify-center rounded-md bg-blue-700 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-blue-800"
            >
              Agent に要約させる
            </button>
            <div id="summary-loading" class="htmx-indicator text-sm font-medium text-blue-700">Agent が記事を処理しています...</div>
          </form>
        </div>

        <div id="workspace" class="min-h-[520px] rounded-lg border border-dashed border-slate-300 bg-white p-6">
          <div class="flex h-full min-h-[460px] items-center justify-center text-center text-slate-500">
            <p>URL を入力すると、Agent の進行状況、要約、グラレコ結果がここに表示されます。</p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
